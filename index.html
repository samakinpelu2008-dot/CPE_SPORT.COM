<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Tournament - User View</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;}
.header{background:#075e54;color:white;padding:15px;font-weight:bold;text-align:center;}
nav{display:flex;justify-content:space-around;background:#25D366;padding:10px;}
nav button{padding:8px 15px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;background:#128C7E;}
.page{display:none;padding:15px;}
.active{display:block;}
.group-table{border-collapse:collapse;width:100%;margin-bottom:20px;background:white;}
.group-table th, .group-table td{border:1px solid #ccc;padding:6px;text-align:center;}
.fixture-card{border:1px solid #ccc;border-radius:8px;padding:10px;margin-bottom:10px;background:white;}
</style>
</head>
<body>

<div class="header">League Tournament - User View</div>
<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('tables')">Tables</button>
  <button onclick="showPage('fixtures')">Fixtures/Results</button>
</nav>

<!-- Home Page -->
<div id="home" class="page active">
  <h2>Admin News</h2>
  <div id="adminNews">
    <p>Welcome to the League Tournament! Check the latest scores and standings.</p>
  </div>
</div>

<!-- Tables Page -->
<div id="tables" class="page">
  <h2>Group Tables</h2>
  <div id="tablesContainer"></div>
</div>

<!-- Fixtures Page -->
<div id="fixtures" class="page">
  <h2>Fixtures & Results</h2>
  <div id="fixturesContainer"></div>
</div>

<script>
// --- Config for demo ---
const GROUPS = ['A','B','C','D','E','F','G','H','I'];
const TEAMS_PER_GROUP = 4;

// Sample groups with team names (user cannot edit)
let groups = {
  A: [{name:'Team A1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team A2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team A3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team A4',w:0,d:0,l:0,gd:0,pts:0}],
  B: [{name:'Team B1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team B2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team B3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team B4',w:0,d:0,l:0,gd:0,pts:0}],
  C: [{name:'Team C1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team C2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team C3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team C4',w:0,d:0,l:0,gd:0,pts:0}],
  D: [{name:'Team D1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team D2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team D3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team D4',w:0,d:0,l:0,gd:0,pts:0}],
  E: [{name:'Team E1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team E2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team E3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team E4',w:0,d:0,l:0,gd:0,pts:0}],
  F: [{name:'Team F1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team F2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team F3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team F4',w:0,d:0,l:0,gd:0,pts:0}],
  G: [{name:'Team G1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team G2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team G3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team G4',w:0,d:0,l:0,gd:0,pts:0}],
  H: [{name:'Team H1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team H2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team H3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team H4',w:0,d:0,l:0,gd:0,pts:0}],
  I: [{name:'Team I1',w:0,d:0,l:0,gd:0,pts:0},{name:'Team I2',w:0,d:0,l:0,gd:0,pts:0},{name:'Team I3',w:0,d:0,l:0,gd:0,pts:0},{name:'Team I4',w:0,d:0,l:0,gd:0,pts:0}]
};

// Sample fixtures with TBD dates
let fixtures = {};
for(let g of GROUPS){
  fixtures[g]=[];
  let teams = groups[g].map(t=>t.name);
  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      fixtures[g].push({home:teams[i],away:teams[j],scoreHome:'-',scoreAway:'-',date:'TBD'});
    }
  }
}

// --- Page navigation ---
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// --- Render Tables ---
function renderTables(){
  let container = document.getElementById('tablesContainer');
  container.innerHTML='';
  for(let g of GROUPS){
    let tbl = document.createElement('table');
    tbl.classList.add('group-table');
    let html = `<tr><th colspan="6">Group ${g}</th></tr>
    <tr><th>Team</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>`;
    groups[g].sort((a,b)=>b.pts-b.pts || b.gd-a.gd);
    for(let t of groups[g]){
      html+=`<tr>
        <td>${t.name}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gd}</td><td>${t.pts}</td>
      </tr>`;
    }
    tbl.innerHTML=html;
    container.appendChild(tbl);
  }
}

// --- Render Fixtures ---
function renderFixtures(){
  let container = document.getElementById('fixturesContainer');
  container.innerHTML='';
  for(let g of GROUPS){
    let h3 = document.createElement('h3');
    h3.innerText = `Group ${g}`;
    container.appendChild(h3);
    for(let f of fixtures[g]){
      let div = document.createElement('div');
      div.classList.add('fixture-card');
      div.innerHTML = `<b>${f.date}</b><br>${f.home} vs ${f.away} <br>Score: ${f.scoreHome} - ${f.scoreAway}`;
      container.appendChild(div);
    }
  }
}

// --- Initial render ---
renderTables();
renderFixtures();
</script>

</body>
</html>
