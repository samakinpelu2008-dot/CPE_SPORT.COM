<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sammy Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #0d6efd;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    max-width: 70%;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    position: relative;
    word-wrap: break-word;
}

.me {
    background: #d1e7ff;
    align-self: flex-end;
}

.other {
    background: #e4e6eb;
}

.reply-preview {
    background: #dcdcdc;
    padding: 6px;
    border-radius: 8px;
    margin-bottom: 5px;
    font-size: 13px;
    cursor: pointer;
}

.reply-name {
    font-weight: bold;
    font-size: 12px;
}

.highlight {
    animation: glow 1s ease;
}

@keyframes glow {
    0% { background: yellow; }
    100% { background: inherit; }
}

#replyBar {
    display: none;
    background: #ddd;
    padding: 8px;
    font-size: 14px;
}

#inputArea {
    display: flex;
    padding: 8px;
    background: white;
}

textarea {
    flex: 1;
    resize: none;
    border-radius: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    margin-left: 5px;
    border: none;
    background: #0d6efd;
    color: white;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
}

.reply-btn {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Sammy Chat</header>

<div id="chat"></div>

<div id="replyBar"></div>

<div id="inputArea">
    <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
    <button onclick="sendMessage()">➤</button>
</div>

<script>
let chat = document.getElementById("chat");
let input = document.getElementById("messageInput");
let replyBar = document.getElementById("replyBar");

let replyingTo = null;
let messageCount = 0;

input.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = (this.scrollHeight) + "px";
});

function sendMessage() {
    if (input.value.trim() === "") return;

    let messageId = "msg" + messageCount++;
    let messageDiv = document.createElement("div");
    messageDiv.className = "message me";
    messageDiv.id = messageId;

    if (replyingTo) {
        let replyDiv = document.createElement("div");
        replyDiv.className = "reply-preview";
        replyDiv.innerHTML =
            "<div class='reply-name'>" + replyingTo.name + "</div>" +
            "<div>" + replyingTo.text + "</div>";

        replyDiv.onclick = function () {
            scrollToMessage(replyingTo.id);
        };

        messageDiv.appendChild(replyDiv);
    }

    let textDiv = document.createElement("div");
    textDiv.innerText = input.value;
    messageDiv.appendChild(textDiv);

    // Reply button fallback
    let replyBtn = document.createElement("div");
    replyBtn.className = "reply-btn";
    replyBtn.innerText = "Reply";
    replyBtn.onclick = function () {
        setReply(messageId, "You", input.value);
    };
    messageDiv.appendChild(replyBtn);

    chat.appendChild(messageDiv);

    input.value = "";
    replyingTo = null;
    replyBar.style.display = "none";

    chat.scrollTop = chat.scrollHeight;
}

function setReply(id, name, text) {
    replyingTo = { id: id, name: name, text: text };
    replyBar.style.display = "block";
    replyBar.innerHTML =
        "Replying to <b>" + name + "</b>: " + text +
        " <span style='float:right;cursor:pointer' onclick='cancelReply()'>✖</span>";
}

function cancelReply() {
    replyingTo = null;
    replyBar.style.display = "none";
}

function scrollToMessage(id) {
    let msg = document.getElementById(id);
    if (msg) {
        msg.scrollIntoView({ behavior: "smooth", block: "center" });
        msg.classList.add("highlight");
        setTimeout(() => {
            msg.classList.remove("highlight");
        }, 1000);
    }
}
</script>

</body>
</html>
