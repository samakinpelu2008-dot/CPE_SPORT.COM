<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dynamic Tournament Manager - Test Version</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
h2 { color:gold; margin-top:40px; }
.group, .stage { background:#1e293b; padding:15px; margin:15px 0; border-radius:10px; }
button { padding:5px 10px; margin:5px; cursor:pointer; }
input { width:50px; text-align:center; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #444; padding:5px; text-align:center; }
.fixture { margin:5px 0; }
.small { font-size:12px; opacity:0.8; }
</style>
</head>
<body>

<h1>🏆 Tournament Manager (Test)</h1>

<div id="groupsContainer"></div>

<button onclick="proceedNextStage()">Proceed To Next Stage</button>

<div id="nextStage"></div>

<h2>📅 Fixtures</h2>
<div id="fixturesList"></div>

<h2>✅ Results</h2>
<div id="resultsList"></div>

<script>
let tournament = {
  groups:{},
  fixtures:[],
  results:[],
  stages:[]
};

const groupLetters = ["A","B","C","D","E","F","G","H","I"];

function initGroups(){
  groupLetters.forEach(letter=>{
    tournament.groups[letter]={ teams:[], matches:[], table:[] };
    createGroupUI(letter);
  });
}

function createGroupUI(letter){
  const container = document.getElementById("groupsContainer");
  const div = document.createElement("div");
  div.className="group";
  div.id="group"+letter;
  div.innerHTML=`
    <h2>Group ${letter}</h2>
    <input type="text" placeholder="Team name" id="teamInput${letter}">
    <button onclick="addTeam('${letter}')">Add Team</button>
    <div id="teams${letter}"></div>
    <div id="fixtures${letter}"></div>
    <div id="table${letter}"></div>
  `;
  container.appendChild(div);
}

function addTeam(letter){
  const input=document.getElementById("teamInput"+letter);
  const name=input.value.trim();
  if(!name) return;
  tournament.groups[letter].teams.push(name);
  input.value="";
  renderTeams(letter);
  generateGroupFixtures(letter);
}

function renderTeams(letter){
  document.getElementById("teams"+letter).innerHTML=
    "<b>Teams:</b> "+tournament.groups[letter].teams.join(", ");
}

function generateGroupFixtures(letter){
  const group=tournament.groups[letter];
  group.matches=[];
  group.table=[];
  const teams=group.teams;

  teams.forEach(t=>{
    group.table.push({team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0});
  });

  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      let match={
        team1:teams[i],
        team2:teams[j],
        group:letter,
        score1:null,
        score2:null,
        date:null
      };
      group.matches.push(match);
      tournament.fixtures.push(match);
    }
  }
  renderGroupFixtures(letter);
  renderTable(letter);
  renderFixturesPage();
}

function renderGroupFixtures(letter){
  const div=document.getElementById("fixtures"+letter);
  div.innerHTML="<b>Matches:</b>";
  tournament.groups[letter].matches.forEach((m,index)=>{
    div.innerHTML+=`
      <div class="fixture">
        ${m.team1} 
        <input type="number" onchange="setScore('${letter}',${index},1,this.value)">
        -
        <input type="number" onchange="setScore('${letter}',${index},2,this.value)">
        ${m.team2}
        <span class="small">${m.date?m.date:"TBD"}</span>
        <button onclick="setDate('${letter}',${index})">Set Time</button>
      </div>
    `;
  });
}

function setDate(letter,index){
  const d=prompt("Enter date/time (YYYY-MM-DD HH:MM)");
  if(!d) return;
  tournament.groups[letter].matches[index].date=d;
  renderGroupFixtures(letter);
  renderFixturesPage();
}

function setScore(letter,index,team,val){
  const match=tournament.groups[letter].matches[index];
  if(team==1) match.score1=parseInt(val);
  else match.score2=parseInt(val);

  if(match.score1!=null && match.score2!=null){
    updateTable(letter,match);
    tournament.results.push(match);
    tournament.fixtures=tournament.fixtures.filter(m=>m!==match);
    renderFixturesPage();
    renderResults();
  }
}

function updateTable(letter,match){
  const table=tournament.groups[letter].table;
  let t1=table.find(t=>t.team===match.team1);
  let t2=table.find(t=>t.team===match.team2);

  t1.P++; t2.P++;
  t1.GF+=match.score1; t1.GA+=match.score2;
  t2.GF+=match.score2; t2.GA+=match.score1;

  if(match.score1>match.score2){ t1.W++; t1.PTS+=3; t2.L++; }
  else if(match.score2>match.score1){ t2.W++; t2.PTS+=3; t1.L++; }
  else { t1.D++; t2.D++; t1.PTS++; t2.PTS++; }

  table.forEach(t=>t.GD=t.GF-t.GA);
  table.sort((a,b)=>b.PTS-a.PTS || b.GD-a.GD || b.GF-a.GF);
  renderTable(letter);
}

function renderTable(letter){
  const table=tournament.groups[letter].table;
  let html="<table><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr>";
  table.forEach(t=>{
    html+=`<tr>
      <td>${t.team}</td>
      <td>${t.P}</td>
      <td>${t.W}</td>
      <td>${t.D}</td>
      <td>${t.L}</td>
      <td>${t.GD}</td>
      <td>${t.PTS}</td>
    </tr>`;
  });
  html+="</table>";
  document.getElementById("table"+letter).innerHTML=html;
}

function renderFixturesPage(){
  let sorted=[...tournament.fixtures].sort((a,b)=>{
    if(!a.date) return 1;
    if(!b.date) return -1;
    return new Date(a.date)-new Date(b.date);
  });
  document.getElementById("fixturesList").innerHTML=
    sorted.map(m=>`${m.team1} vs ${m.team2} (${m.date||"TBD"})`).join("<br>");
}

function renderResults(){
  document.getElementById("resultsList").innerHTML=
    tournament.results.map(m=>`${m.team1} ${m.score1} - ${m.score2} ${m.team2}`).join("<br>");
}

function proceedNextStage(){
  const stageName=prompt("Enter Stage Name (e.g Quarter Final)");
  if(!stageName) return;
  let qualifiers=[];
  groupLetters.forEach(letter=>{
    const group=tournament.groups[letter];
    if(group.table.length>0){
      const pick=prompt(`From Group ${letter}, type team names separated by comma to qualify`);
      if(pick){
        pick.split(",").forEach(name=>{
          qualifiers.push(name.trim());
        });
      }
    }
  });

  const mode=prompt("Type AUTO or MANUAL matchmaking?");
  let matches=[];
  if(mode==="AUTO"){
    for(let i=0;i<qualifiers.length;i+=2){
      if(qualifiers[i+1])
      matches.push({team1:qualifiers[i],team2:qualifiers[i+1]});
    }
  }else{
    while(qualifiers.length>1){
      const t1=prompt("Enter first team");
      const t2=prompt("Enter second team");
      matches.push({team1:t1,team2:t2});
      qualifiers=qualifiers.filter(t=>t!==t1 && t!==t2);
    }
  }

  tournament.stages.push({name:stageName,matches:matches});
  renderStage();
}

function renderStage(){
  const div=document.getElementById("nextStage");
  div.innerHTML="";
  tournament.stages.forEach(stage=>{
    div.innerHTML+=`<div class="stage"><h2>${stage.name}</h2>`+
    stage.matches.map(m=>`${m.team1} vs ${m.team2}`).join("<br>")+
    "</div>";
  });
}

initGroups();
</script>

</body>
</html>
