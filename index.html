<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Chat Prototype</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;}
.chat-container{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;background:#fff;}
.header{background:#075e54;color:white;padding:15px;font-weight:bold;}
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.message{max-width:75%;padding:8px;margin:5px 0;border-radius:8px;position:relative;word-wrap:break-word;}
.sent{align-self:flex-end;background:#dcf8c6;}
.received{align-self:flex-start;background:#fff;}
.reply-preview{background:#f0f0f0;padding:5px;margin-bottom:5px;border-radius:5px;font-size:12px;cursor:pointer;}
.reply-name{font-weight:bold;font-size:12px;margin-bottom:2px;}
.message img{max-width:100%;border-radius:6px;margin-top:5px;}
.input-area{display:flex;align-items:center;padding:10px;border-top:1px solid #ddd;}
textarea{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc;outline:none;max-height:120px;overflow-y:auto;}
button{margin-left:5px;padding:8px 12px;border:none;border-radius:20px;background:#075e54;color:white;cursor:pointer;}
.emoji-picker{position:absolute;bottom:50px;left:10px;background:white;border-radius:12px;padding:5px;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;flex-wrap:wrap;width:200px;gap:5px;}
.emoji-picker span{cursor:pointer;font-size:18px;}
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">Sammy Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <button onclick="toggleEmojiPicker()">😀</button>
    <button onclick="attachImage()">📷</button>
    <textarea id="messageInput" rows="1" placeholder="Type a message"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="emojiPicker" class="emoji-picker" style="display:none;"></div>

<script>
let messagesDiv = document.getElementById("messages");
let messageInput = document.getElementById("messageInput");
let emojiPicker = document.getElementById("emojiPicker");
let replyTo = null;
let messageCount = 0;

// Sample emoji list
const emojis = ["😀","😂","❤️","👍","🔥","😮","😢","😍","🎉","🙌"];

emojis.forEach(emoji=>{
  let span = document.createElement("span");
  span.innerText = emoji;
  span.onclick = ()=> {
    messageInput.value += emoji;
    messageInput.focus();
  };
  emojiPicker.appendChild(span);
});

// Adjust textarea height
messageInput.addEventListener("input", function(){
  this.style.height="auto";
  this.style.height=this.scrollHeight+"px";
});

function toggleEmojiPicker(){
  emojiPicker.style.display = emojiPicker.style.display==="none"?"flex":"none";
}

function attachImage(){
  let fileInput = document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";
  fileInput.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(evt){
      createMessage("", "sent", replyTo, evt.target.result);
      replyTo=null;
    };
    reader.readAsDataURL(file);
  };
  fileInput.click();
}

function sendMessage(){
  let text = messageInput.value.trim();
  if(text==="") return;
  createMessage(text, "sent", replyTo);
  messageInput.value="";
  replyTo=null;
}

function createMessage(text,type,replyData=null,imgSrc=null){
  messageCount++;
  let msgDiv = document.createElement("div");
  msgDiv.classList.add("message",type);
  msgDiv.id = "msg-"+messageCount;

  if(replyData){
    let preview = document.createElement("div");
    preview.classList.add("reply-preview");
    preview.innerHTML = `<div class="reply-name">${replyData.name}</div>${replyData.text}`;
    preview.onclick = ()=>document.getElementById(replyData.id).scrollIntoView({behavior:"smooth"});
    msgDiv.appendChild(preview);
  }

  if(text) msgDiv.appendChild(document.createElement("div")).innerText=text;
  if(imgSrc){
    let img = document.createElement("img");
    img.src=imgSrc;
    msgDiv.appendChild(img);
  }

  // Reply on long press
  msgDiv.addEventListener("mousedown",()=>{
    longPressTimer = setTimeout(()=>setReply(msgDiv.id,type==="sent"?"You":"Other",text),500);
  });
  msgDiv.addEventListener("mouseup",()=>clearTimeout(longPressTimer));
  msgDiv.addEventListener("mouseleave",()=>clearTimeout(longPressTimer));

  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function setReply(id,name,text){
  replyTo = {id,name,text};
  // simple visual feedback
  messageInput.placeholder = "Replying to "+name;
}

// Sample received messages
createMessage("Hey! This is a test message","received");
createMessage("You can reply, attach images or emojis","received");
</script>

</body>
</html>
