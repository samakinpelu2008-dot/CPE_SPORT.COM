<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatsApp-Style Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #e5ddd5;
  height: 100vh;
  overflow: hidden;
}

/* Chat container */
.chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  padding-bottom: 100px; /* space for input */
  scroll-behavior: smooth;
}

/* Message bubbles */
.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 18px;
  line-height: 1.3;
  word-wrap: break-word;
  position: relative;
}

.message.other {
  background: white;
  align-self: flex-start;
}

.message.you {
  background: #dcf8c6;
  align-self: flex-end;
}

/* Sender and timestamp */
.sender {
  font-weight: bold;
  margin-bottom: 4px;
  font-size: 14px;
}

.timestamp {
  font-size: 12px;
  opacity: 0.6;
  text-align: right;
  margin-top: 4px;
}

/* Floating input */
.chat-input {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  padding: 10px;
  background: #f0f0f0;
  border-top: 1px solid #ccc;
  z-index: 10;
}

.chat-input input {
  flex: 1;
  padding: 12px 16px;
  font-size: 18px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

.chat-input button {
  margin-left: 10px;
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #075e54;
  color: white;
  cursor: pointer;
}

/* Swipe to reply highlight */
.message.swipe-reply {
  border-left: 4px solid #25d366;
  padding-left: 8px;
  opacity: 0.7;
}

/* Scrollbar */
.chat-messages::-webkit-scrollbar {
  width: 6px;
}

.chat-messages::-webkit-scrollbar-thumb {
  background-color: rgba(0,0,0,0.2);
  border-radius: 3px;
}
</style>
</head>

<body>

<div class="chat-page">
  <div class="chat-messages" id="messages">
    <div class="message other" data-id="1">
      <div class="sender">Samuel</div>
      Hey guys! Welcome to the Cup 🔥
      <div class="timestamp">2:01 PM</div>
    </div>
    <div class="message you" data-id="2">
      <div class="sender">You</div>
      Let's win this! 💪
      <div class="timestamp">2:02 PM</div>
    </div>
    <div class="message other" data-id="3">
      <div class="sender">James</div>
      CPE looks unstoppable this year!
      <div class="timestamp">2:03 PM</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('msgInput');
let replyMessageId = null;

// Send message function
function sendMessage() {
  const text = input.value.trim();
  if(!text) return;

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message you';
  const now = new Date();
  const hours = now.getHours() % 12 || 12;
  const minutes = now.getMinutes().toString().padStart(2,'0');
  const period = now.getHours() >= 12 ? 'PM':'AM';
  const timestamp = `${hours}:${minutes} ${period}`;

  msgDiv.innerHTML = `
    <div class="sender">You</div>
    ${replyMessageId ? `<i>Replying to: ${document.querySelector('.message[data-id="'+replyMessageId+'"] .sender').textContent}</i><br>` : ''}
    ${text}
    <div class="timestamp">${timestamp}</div>
  `;

  messages.appendChild(msgDiv);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
  replyMessageId = null;
}

// Swipe to reply (click or swipe left)
messages.addEventListener('click', function(e){
  const msgDiv = e.target.closest('.message');
  if(!msgDiv || msgDiv.classList.contains('you')) return;

  // Highlight for reply
  document.querySelectorAll('.message').forEach(m=>m.classList.remove('swipe-reply'));
  msgDiv.classList.add('swipe-reply');

  replyMessageId = msgDiv.dataset.id;
  input.focus();
});

// Send with Enter
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    sendMessage();
  }
});
</script>

</body>
</html>
