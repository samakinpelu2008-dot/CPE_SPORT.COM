<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Chat Prototype</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#ece5dd;
}

.chat-container{
  max-width:500px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#fff;
}

.header{
  background:#075e54;
  color:white;
  padding:15px;
  font-weight:bold;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.message{
  max-width:75%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  position:relative;
  word-wrap:break-word;
}

.sent{
  align-self:flex-end;
  background:#dcf8c6;
}

.received{
  align-self:flex-start;
  background:#fff;
}

.reply-preview{
  background:#f0f0f0;
  padding:5px;
  margin-bottom:5px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
}

.reply-name{
  font-weight:bold;
  font-size:12px;
  margin-bottom:2px;
}

.reactions{
  position:absolute;
  bottom:-18px;
  right:5px;
  background:white;
  border-radius:12px;
  padding:2px 6px;
  font-size:12px;
  display:flex;
  gap:4px;
}

.reaction-picker{
  position:absolute;
  bottom:40px;
  background:white;
  border-radius:20px;
  padding:5px 8px;
  display:flex;
  gap:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  animation:fadeIn 0.2s ease;
}

.reaction-picker span{
  cursor:pointer;
  font-size:18px;
}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:8px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

button{
  margin-left:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#075e54;
  color:white;
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">Sammy Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let messagesDiv = document.getElementById("messages");
let messageInput = document.getElementById("messageInput");
let messageCount = 0;
let replyTo = null;
let longPressTimer;
let activePicker = null;

function sendMessage(){
  let text = messageInput.value.trim();
  if(text === "") return;

  createMessage(text, "sent", replyTo);
  messageInput.value="";
  replyTo=null;
}

function createMessage(text, type, replyData=null){
  messageCount++;

  let msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.id = "msg-"+messageCount;

  if(replyData){
    let preview = document.createElement("div");
    preview.classList.add("reply-preview");

    preview.innerHTML = `
      <div class="reply-name">${replyData.name}</div>
      ${replyData.text}
    `;

    preview.onclick = () => {
      document.getElementById(replyData.id)
        .scrollIntoView({behavior:"smooth"});
    };

    msg.appendChild(preview);
  }

  let content = document.createElement("div");
  content.innerText = text;
  msg.appendChild(content);

  // Long press detection
  msg.addEventListener("mousedown", () => {
    longPressTimer = setTimeout(()=>{
      showReactionPicker(msg);
    },500);
  });

  msg.addEventListener("mouseup", () => {
    clearTimeout(longPressTimer);
  });

  msg.addEventListener("mouseleave", () => {
    clearTimeout(longPressTimer);
  });

  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showReactionPicker(messageElement){
  if(activePicker) activePicker.remove();

  let picker = document.createElement("div");
  picker.classList.add("reaction-picker");

  let emojis = ["👍","❤️","😂","😮","😢","🔥"];

  emojis.forEach(emoji=>{
    let span = document.createElement("span");
    span.innerText = emoji;
    span.onclick = ()=>{
      addReaction(messageElement, emoji);
      picker.remove();
    };
    picker.appendChild(span);
  });

  messageElement.appendChild(picker);
  activePicker = picker;

  document.addEventListener("click", function removePicker(e){
    if(!picker.contains(e.target)){
      picker.remove();
      document.removeEventListener("click", removePicker);
    }
  });
}

function addReaction(messageElement, emoji){
  let reactions = messageElement.querySelector(".reactions");

  if(!reactions){
    reactions = document.createElement("div");
    reactions.classList.add("reactions");
    messageElement.appendChild(reactions);
  }

  reactions.innerHTML += `<span>${emoji}</span>`;
}

// Demo received message
createMessage("Hey bro 👋", "received");
createMessage("How far?", "received");
</script>

</body>
</html>
