<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Chat Prototype</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;}
.chat-container{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;background:#fff;position:relative;}
.header{background:#075e54;color:white;padding:15px;font-weight:bold;}
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.message{max-width:75%;padding:8px;margin:5px 0;border-radius:12px;position:relative;word-wrap:break-word;transition:transform 0.2s ease;}
.sent{align-self:flex-end;background:#dcf8c6;}
.received{align-self:flex-start;background:#fff;}
.reply-preview{background:#f0f0f0;padding:5px;margin-bottom:5px;border-radius:5px;font-size:12px;cursor:pointer;display:flex;align-items:center;}
.reply-name{font-weight:bold;font-size:12px;margin-bottom:2px;}
.arrow{font-weight:bold;margin-right:5px;}
.highlight{background:yellow;}
.message img{max-width:250px;border-radius:12px;margin-top:5px;display:block;}
.input-area{display:flex;align-items:center;padding:10px;border-top:1px solid #ddd;position:relative;}
textarea{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc;outline:none;max-height:120px;overflow-y:auto;}
button{margin-left:5px;padding:8px 12px;border:none;border-radius:20px;background:#075e54;color:white;cursor:pointer;}
.sticker-picker{position:absolute;bottom:50px;left:10px;background:white;border-radius:12px;padding:5px;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;flex-wrap:wrap;width:200px;gap:5px;}
.sticker-picker img{width:50px;height:50px;cursor:pointer;border-radius:12px;}
#scrollToLatest{position:absolute;bottom:80px;right:20px;background:#075e54;color:white;padding:8px;border-radius:50%;cursor:pointer;display:none;box-shadow:0 2px 6px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">Sammy Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <button onclick="toggleStickerPicker()">� stickers</button>
    <button onclick="attachImage()">📷</button>
    <textarea id="messageInput" rows="1" placeholder="Type a message"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>

  <div id="scrollToLatest" onclick="scrollToLatest()">↓</div>
</div>

<div id="stickerPicker" class="sticker-picker" style="display:none;"></div>

<script>
let messagesDiv = document.getElementById("messages");
let messageInput = document.getElementById("messageInput");
let stickerPicker = document.getElementById("stickerPicker");
let replyTo = null;
let messageCount = 0;
let scrollArrow = document.getElementById("scrollToLatest");

// Stickers
const stickers = [
  "https://i.imgur.com/1Q1Z1G5.png",
  "https://i.imgur.com/XsQOWjU.png",
  "https://i.imgur.com/5Tt9Bna.png",
  "https://i.imgur.com/3v2Ujhy.png"
];
stickers.forEach(src=>{
  let img = document.createElement("img");
  img.src=src;
  img.onclick = () => {
    createMessage("", "sent", replyTo, src);
    replyTo=null;
    stickerPicker.style.display="none";
  };
  stickerPicker.appendChild(img);
});

// Expandable textarea
messageInput.addEventListener("input", function(){
  this.style.height="auto";
  this.style.height=this.scrollHeight+"px";
});

function toggleStickerPicker(){
  stickerPicker.style.display = stickerPicker.style.display==="none"?"flex":"none";
}

function attachImage(){
  let fileInput = document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";
  fileInput.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(evt){
      createMessage("", "sent", replyTo, evt.target.result);
      replyTo=null;
    };
    reader.readAsDataURL(file);
  };
  fileInput.click();
}

function sendMessage(){
  let text = messageInput.value.trim();
  if(text==="") return;
  createMessage(text, "sent", replyTo);
  messageInput.value="";
  replyTo=null;
}

// Create message with swipe-to-reply
function createMessage(text,type,replyData=null,imgSrc=null){
  messageCount++;
  let msgDiv = document.createElement("div");
  msgDiv.classList.add("message",type);
  msgDiv.id = "msg-"+messageCount;

  if(replyData){
    let preview = document.createElement("div");
    preview.classList.add("reply-preview");
    preview.innerHTML = `<span class="arrow">↩</span><div>
      <div class="reply-name">${replyData.name}</div>
      ${replyData.text || '<i>Sticker/Image</i>'}
    </div>`;
    preview.onclick = ()=>{
      let orig = document.getElementById(replyData.id);
      if(orig){
        orig.scrollIntoView({behavior:"smooth",block:"center"});
        orig.classList.add("highlight");
        setTimeout(()=>orig.classList.remove("highlight"),1200);
      }
    };
    msgDiv.appendChild(preview);
  }

  if(text) msgDiv.appendChild(document.createElement("div")).innerText=text;
  if(imgSrc){
    let img = document.createElement("img");
    img.src=imgSrc;
    msgDiv.appendChild(img);
  }

  // Swipe-to-reply logic
  let startX=0,currentX=0,threshold=60;
  msgDiv.addEventListener("mousedown", e=>{
    startX=e.clientX;
    msgDiv.onmousemove = move;
    msgDiv.onmouseup = up;
  });
  function move(e){
    currentX=e.clientX;
    let diff=currentX-startX;
    if(diff>0) msgDiv.style.transform="translateX("+diff+"px)";
  }
  function up(){
    let diff=currentX-startX;
    msgDiv.style.transform="translateX(0px)";
    if(diff>threshold){
      setReply(msgDiv.id,type==="sent"?"You":"Other",text || '<Sticker/Image>');
    }
    msgDiv.onmousemove=null;
    msgDiv.onmouseup=null;
  }

  // Mobile swipe
  msgDiv.addEventListener("touchstart", e=>{startX=e.touches[0].clientX;});
  msgDiv.addEventListener("touchmove", e=>{
    currentX=e.touches[0].clientX;
    let diff=currentX-startX;
    if(diff>0) msgDiv.style.transform="translateX("+diff+"px)";
  });
  msgDiv.addEventListener("touchend", e=>{
    let diff=currentX-startX;
    msgDiv.style.transform="translateX(0px)";
    if(diff>threshold){
      setReply(msgDiv.id,type==="sent"?"You":"Other",text || '<Sticker/Image>');
    }
  });

  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function setReply(id,name,text){
  replyTo = {id,name,text};
  messageInput.placeholder="Replying to "+name;
}

// Jump to latest message arrow
messagesDiv.addEventListener("scroll", ()=>{
  if(messagesDiv.scrollTop + messagesDiv.clientHeight < messagesDiv.scrollHeight - 50){
    scrollArrow.style.display="block";
  } else {
    scrollArrow.style.display="none";
  }
});
function scrollToLatest(){
  messagesDiv.scrollTo({top:messagesDiv.scrollHeight, behavior:"smooth"});
}

// Sample messages
for(let i=1;i<=50;i++){
  createMessage("Sample message number "+i,"received");
}
createMessage("Swipe messages to reply, tap arrow to scroll to original","received");
</script>

</body>
</html>
