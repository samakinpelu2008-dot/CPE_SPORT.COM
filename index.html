<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cup App</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family: Arial, sans-serif;
background:#e5ddd5;
}

/* CHAT PAGE ONLY */
.chat-page{
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* Messages area */
.chat-messages{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:80px; /* space for input */
}

/* Message bubble */
.message{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:75%;
font-size:18px;
}

.you{
background:#dcf8c6;
margin-left:auto;
}

/* INPUT BAR FIXED */
.chat-input{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
padding:10px;
background:#f0f0f0;
border-top:1px solid #ccc;
}

.chat-input input{
flex:1;
padding:12px;
font-size:18px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

.chat-input button{
margin-left:10px;
padding:12px 18px;
font-size:18px;
border:none;
border-radius:25px;
background:#075e54;
color:white;
}
</style>
</head>

<body>

<div class="chat-page">

<div class="chat-messages" id="messages">
<div class="message">Samuel: Welcome guys 🔥</div>
<div class="message you">You: Let’s win this cup 💪</div>
</div>

<div class="chat-input">
<input type="text" id="msgInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
function sendMessage(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="message you";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight;
}
}
</script>

</body>
</html>
