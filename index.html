<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Chat</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  background: #0d6efd;
  color: white;
  padding: 16px;
  font-weight: bold;
  font-size: 18px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

.message-wrapper {
  display: flex;
  margin-bottom: 8px;
}

.me { justify-content: flex-end; }
.other { justify-content: flex-start; }

.message {
  max-width: 75%;
  padding: 10px 12px;
  border-radius: 14px;
  position: relative;
  transition: transform 0.2s ease;
  word-wrap: break-word;
}

.me .message { background: #d1e7ff; }
.other .message { background: #e4e6eb; }

.reply-card {
  background: #dcdcdc;
  border-radius: 8px;
  padding: 6px;
  margin-bottom: 6px;
  font-size: 13px;
  cursor: pointer;
}

.reply-name {
  font-weight: bold;
  font-size: 12px;
}

.highlight {
  animation: glow 1s ease;
}

@keyframes glow {
  0% { background: #fff3cd; }
  100% { background: inherit; }
}

.reaction-bar {
  position: absolute;
  bottom: -40px;
  left: 0;
  background: white;
  padding: 5px 8px;
  border-radius: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  display: flex;
  gap: 6px;
  font-size: 18px;
  z-index: 100;
}

.reactions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  font-size: 14px;
}

.reaction-item {
  background: white;
  padding: 3px 6px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid #ddd;
}

#replyBar {
  display: none;
  background: #e0e0e0;
  padding: 8px 12px;
  font-size: 14px;
}

#inputArea {
  display: flex;
  padding: 8px;
  background: white;
}

textarea {
  flex: 1;
  resize: none;
  border-radius: 20px;
  padding: 10px;
  border: 1px solid #ccc;
  outline: none;
  max-height: 120px;
  overflow-y: auto;
}

button {
  margin-left: 6px;
  border: none;
  background: #0d6efd;
  color: white;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Sammy Chat</header>

<div id="chat"></div>

<div id="replyBar"></div>

<div id="inputArea">
  <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");
const replyBar = document.getElementById("replyBar");

let replyingTo = null;
let messageCounter = 0;
let messages = {};
const availableReactions = ["❤️","😂","🔥","👍","😮"];

input.addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";
});

function sendMessage() {
  if (!input.value.trim()) return;

  const id = "msg" + messageCounter++;
  const text = input.value.trim();

  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper me";

  const message = document.createElement("div");
  message.className = "message";
  message.id = id;

  if (replyingTo) {
    const replyCard = document.createElement("div");
    replyCard.className = "reply-card";
    replyCard.innerHTML =
      "<div class='reply-name'>" + replyingTo.name + "</div>" +
      "<div>" + replyingTo.text + "</div>";

    replyCard.onclick = () => scrollToMessage(replyingTo.id);
    message.appendChild(replyCard);
  }

  const textNode = document.createElement("div");
  textNode.innerText = text;
  message.appendChild(textNode);

  wrapper.appendChild(message);
  chat.appendChild(wrapper);

  messages[id] = { id, name: "You", text };

  addSwipeToReply(message, id);

  input.value = "";
  input.style.height = "auto";
  replyingTo = null;
  replyBar.style.display = "none";

  chat.scrollTop = chat.scrollHeight;
}

function setReply(id, name, text) {
  replyingTo = { id, name, text };
  replyBar.style.display = "block";
  replyBar.innerHTML =
    "Replying to <b>" + name + "</b>: " + text +
    " <span style='float:right;cursor:pointer' onclick='cancelReply()'>✖</span>";
}

function cancelReply() {
  replyingTo = null;
  replyBar.style.display = "none";
}

function scrollToMessage(id) {
  const msg = document.getElementById(id);
  if (!msg) return;

  msg.scrollIntoView({ behavior: "smooth", block: "center" });
  msg.classList.add("highlight");

  setTimeout(() => {
    msg.classList.remove("highlight");
  }, 1000);
}

function showReactionBar(element, id) {
  removeReactionBars();

  const bar = document.createElement("div");
  bar.className = "reaction-bar";

  availableReactions.forEach(emoji => {
    const span = document.createElement("span");
    span.innerText = emoji;
    span.style.cursor = "pointer";
    span.onclick = () => {
      addReaction(id, emoji);
      removeReactionBars();
    };
    bar.appendChild(span);
  });

  element.appendChild(bar);
}

function removeReactionBars() {
  document.querySelectorAll(".reaction-bar").forEach(el => el.remove());
}

function addReaction(messageId, emoji) {
  const message = document.getElementById(messageId);

  let container = message.querySelector(".reactions");

  if (!container) {
    container = document.createElement("div");
    container.className = "reactions";
    message.appendChild(container);
  }

  let existing = Array.from(container.children)
    .find(child => child.dataset.emoji === emoji);

  if (existing) {
    let count = parseInt(existing.dataset.count);
    count++;
    existing.dataset.count = count;
    existing.innerText = emoji + " " + count;
  } else {
    const item = document.createElement("div");
    item.className = "reaction-item";
    item.dataset.emoji = emoji;
    item.dataset.count = 1;
    item.innerText = emoji + " 1";
    container.appendChild(item);
  }
}

function addSwipeToReply(element, id) {
  let startX = 0;
  let currentX = 0;
  let threshold = 80;

  element.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;

    setTimeout(() => {
      showReactionBar(element, id);
    }, 500);
  });

  element.addEventListener("touchmove", e => {
    currentX = e.touches[0].clientX;
    let diff = currentX - startX;
    if (diff > 0) {
      element.style.transform = "translateX(" + diff + "px)";
    }
  });

  element.addEventListener("touchend", () => {
    let diff = currentX - startX;
    element.style.transform = "translateX(0px)";
    if (diff > threshold) {
      const msg = messages[id];
      setReply(id, msg.name, msg.text);
    }
  });

  element.addEventListener("mousedown", e => {
    startX = e.clientX;
    element.onmousemove = move;
    element.onmouseup = up;
  });

  function move(e) {
    currentX = e.clientX;
    let diff = currentX - startX;
    if (diff > 0) {
      element.style.transform = "translateX(" + diff + "px)";
    }
  }

  function up() {
    let diff = currentX - startX;
    element.style.transform = "translateX(0px)";
    if (diff > threshold) {
      const msg = messages[id];
      setReply(id, msg.name, msg.text);
    }
    element.onmousemove = null;
    element.onmouseup = null;
  }

  element.addEventListener("dblclick", () => {
    showReactionBar(element, id);
  });
}
</script>

</body>
  </html>
