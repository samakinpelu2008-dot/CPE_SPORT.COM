<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Chat for 100+ Users</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #e5ddd5;
  height: 100%;
  overflow: hidden;
}

.chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* Scrollable messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  scroll-behavior: smooth;
}

/* Message bubbles */
.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 18px;
  position: relative;
  word-wrap: break-word;
}

.message.other { background: white; align-self: flex-start; }
.message.you { background: #dcf8c6; align-self: flex-end; }

.sender { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
.timestamp { font-size: 12px; opacity: 0.6; text-align: right; margin-top: 4px; }

/* Click-to-reply highlight */
.message.reply-highlight {
  border-left: 4px solid #25d366;
  padding-left: 8px;
  opacity: 0.8;
}

/* Input bar */
.chat-input-container {
  position: relative;
  bottom: 0;
  left: 0;
  right: 0;
  background: #f0f0f0;
  padding: 10px;
  border-top: 1px solid #ccc;
  display: flex;
  z-index: 10;
}

.chat-input-container input {
  flex: 1;
  padding: 12px 16px;
  font-size: 18px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

.chat-input-container button {
  margin-left: 10px;
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #075e54;
  color: white;
  cursor: pointer;
}

/* Scrollbar styling */
.chat-messages::-webkit-scrollbar {
  width: 6px;
}
.chat-messages::-webkit-scrollbar-thumb {
  background-color: rgba(0,0,0,0.2);
  border-radius: 3px;
}
</style>
</head>
<body>

<div class="chat-page">
  <div class="chat-messages" id="messages">
    <div class="message other" data-id="1">
      <div class="sender">Samuel</div>
      Hey guys! Welcome to the Cup 🔥
      <div class="timestamp">2:01 PM</div>
    </div>
    <div class="message you" data-id="2">
      <div class="sender">You</div>
      Let's win this! 💪
      <div class="timestamp">2:02 PM</div>
    </div>
    <div class="message other" data-id="3">
      <div class="sender">James</div>
      CPE looks unstoppable this year!
      <div class="timestamp">2:03 PM</div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="chat-input-container">
    <input type="text" id="msgInput" placeholder="Type a message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let replyMessageId = null;

// Send message
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const hours = now.getHours() % 12 || 12;
  const minutes = now.getMinutes().toString().padStart(2,'0');
  const period = now.getHours() >= 12 ? 'PM':'AM';
  const timestamp = `${hours}:${minutes} ${period}`;

  const div = document.createElement('div');
  div.className = 'message you';
  div.innerHTML = `
    <div class="sender">You</div>
    ${replyMessageId ? `<i>Replying to: ${document.querySelector('.message[data-id="'+replyMessageId+'"] .sender').textContent}</i><br>` : ''}
    ${text}
    <div class="timestamp">${timestamp}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
  
  // clear reply highlight
  document.querySelectorAll('.message').forEach(m => m.classList.remove('reply-highlight'));
  replyMessageId = null;
}

// Send button & Enter key
sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

// Click-to-reply
messages.addEventListener('click', e => {
  const msgDiv = e.target.closest('.message');
  if(!msgDiv || msgDiv.classList.contains('you')) return;

  document.querySelectorAll('.message').forEach(m => m.classList.remove('reply-highlight'));
  msgDiv.classList.add('reply-highlight');
  replyMessageId = msgDiv.dataset.id;
  input.focus();
});
</script>

</body>
</html>
