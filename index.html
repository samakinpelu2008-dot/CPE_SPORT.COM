<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatsApp Style Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #e5ddd5;
  height: 100vh;
  overflow: hidden;
}

/* Main chat container */
.chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* Scrollable messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  padding-bottom: 80px; /* space for input */
  scroll-behavior: smooth;
}

/* Individual messages */
.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 18px;
  line-height: 1.3;
  word-wrap: break-word;
}

.message.other {
  background: white;
  align-self: flex-start;
}

.message.you {
  background: #dcf8c6;
  align-self: flex-end;
}

/* Floating input bar */
.chat-input {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  padding: 10px;
  background: #f0f0f0;
  border-top: 1px solid #ccc;
}

.chat-input input {
  flex: 1;
  padding: 12px 16px;
  font-size: 18px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

.chat-input button {
  margin-left: 10px;
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #075e54;
  color: white;
  cursor: pointer;
}

/* Optional scrollbar styling */
.chat-messages::-webkit-scrollbar {
  width: 6px;
}

.chat-messages::-webkit-scrollbar-thumb {
  background-color: rgba(0,0,0,0.2);
  border-radius: 3px;
}
</style>
</head>

<body>

<div class="chat-page">
  <div class="chat-messages" id="messages">
    <div class="message other">Samuel: Welcome to the Cup group 🔥</div>
    <div class="message you">You: Let's win this! 💪</div>
    <div class="message other">James: CPE looks unstoppable this year!</div>
    <div class="message other">Lily: Don't underestimate APE 😎</div>
  </div>

  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('msgInput');

function sendMessage() {
  if(input.value.trim() === '') return;

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message you';
  msgDiv.textContent = input.value;

  messages.appendChild(msgDiv);
  messages.scrollTop = messages.scrollHeight;

  input.value = '';
}

// Optional: send on Enter key
input.addEventListener('keydown', function(e) {
  if(e.key === 'Enter'){
    sendMessage();
  }
});
</script>

</body>
</html>
