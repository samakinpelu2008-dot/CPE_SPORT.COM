<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Input Demo</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #e5ddd5;
  height: 100%;
  overflow: hidden;
}

.chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* Scrollable messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  padding-bottom: 80px; /* space for normal bar */
  scroll-behavior: smooth;
}

/* Messages */
.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 18px;
  position: relative;
}

.message.other { background: white; align-self: flex-start; }
.message.you { background: #dcf8c6; align-self: flex-end; }

.sender { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
.timestamp { font-size: 12px; opacity: 0.6; text-align: right; margin-top: 4px; }

/* Normal placeholder bar */
.normal-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #f0f0f0;
  padding: 10px;
  border-top: 1px solid #ccc;
  display: flex;
  justify-content: center;
  z-index: 5;
  cursor: text;
}

.normal-bar span {
  background: white;
  padding: 12px 16px;
  border-radius: 25px;
  font-size: 18px;
  color: #555;
}

/* Floating typing bar */
.floating-bar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 10px; /* initial offset, will adjust */
  background: #f0f0f0;
  padding: 10px;
  border-top: 1px solid #ccc;
  display: flex;
  z-index: 10;
  transition: bottom 0.25s;
}

.floating-bar input {
  flex: 1;
  padding: 12px 16px;
  font-size: 18px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

.floating-bar button {
  margin-left: 10px;
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #075e54;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="chat-page">
  <div class="chat-messages" id="messages">
    <div class="message other"><div class="sender">Samuel</div>Hello! Welcome to the Cup 🔥<div class="timestamp">2:01 PM</div></div>
    <div class="message you"><div class="sender">You</div>Let's win this! 💪<div class="timestamp">2:02 PM</div></div>
    <div class="message other"><div class="sender">James</div>CPE looks unstoppable this year!<div class="timestamp">2:03 PM</div></div>
  </div>

  <!-- Normal bar -->
  <div class="normal-bar" id="normalBar"><span>Type a message</span></div>

  <!-- Floating typing bar -->
  <div class="floating-bar" id="floatingBar" style="display:none;">
    <input type="text" id="msgInput" placeholder="Type a message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const normalBar = document.getElementById('normalBar');
const floatingBar = document.getElementById('floatingBar');
const messages = document.getElementById('messages');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

// Tap normal bar -> show floating bar
normalBar.addEventListener('click', () => {
  normalBar.style.display = 'none';
  floatingBar.style.display = 'flex';

  // Simulate keyboard height (approx)
  let kbHeight = window.innerHeight * 0.35; // 35% of screen
  floatingBar.style.bottom = kbHeight + 'px';

  input.focus();
});

// Close floating bar when keyboard is dismissed
input.addEventListener('blur', () => {
  setTimeout(() => { // small delay for mobile
    floatingBar.style.display = 'none';
    normalBar.style.display = 'flex';
  }, 100);
});

// Send message
function sendMessage() {
  const text = input.value.trim();
  if(!text) return;
  const now = new Date();
  const hours = now.getHours() % 12 || 12;
  const minutes = now.getMinutes().toString().padStart(2,'0');
  const period = now.getHours() >= 12 ? 'PM':'AM';
  const timestamp = `${hours}:${minutes} ${period}`;

  const div = document.createElement('div');
  div.className = 'message you';
  div.innerHTML = `<div class="sender">You</div>${text}<div class="timestamp">${timestamp}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
</script>

</body>
</html>
