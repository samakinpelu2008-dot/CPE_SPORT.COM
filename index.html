<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cup App</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

header{
background:#0a3d62;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#082b46;
padding:10px 0;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.page{
display:none;
height:calc(100vh - 130px);
overflow-y:auto;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
font-size:18px;
}

.fixture{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
font-size:18px;
}

.date{
font-weight:bold;
}

.time{
margin:5px 0;
}

.match{
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:20px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
font-size:18px;
}

th, td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

/* CHAT HALL */
.chat-container{
display:flex;
flex-direction:column;
height:calc(100vh - 130px);
background:#e5ddd5;
}

.chat-messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:75%;
font-size:18px;
}

.you{
background:#dcf8c6;
align-self:flex-end;
}

.chat-input{
display:flex;
padding:10px;
background:#f0f0f0;
position:sticky;
bottom:0;
}

.chat-input input{
flex:1;
padding:12px;
font-size:18px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

.chat-input button{
margin-left:10px;
padding:12px 18px;
font-size:18px;
border:none;
border-radius:25px;
background:#0a3d62;
color:white;
cursor:pointer;
}

.view-btn{
background:#0a3d62;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
}
</style>
</head>

<body>

<header>CUP TOURNAMENT</header>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('table')">Tables</button>
<button onclick="showPage('fixtures')">Fixtures</button>
<button onclick="showPage('chat')">Chat Hall</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="card"><b>Admin Post:</b><br>Welcome to the 2026 Cup Tournament 🔥</div>
<div class="card"><b>Admin Post:</b><br>Group stage matches start Monday.</div>
</div>

<!-- TABLE -->
<div id="table" class="page">
<h3>Group A</h3>
<table>
<tr><th>Team</th><th>P</th><th>Pts</th></tr>
<tr><td>CPE</td><td>3</td><td>7</td></tr>
<tr><td>APE</td><td>3</td><td>6</td></tr>
<tr><td>RMD</td><td>3</td><td>3</td></tr>
<tr><td>JBL</td><td>3</td><td>1</td></tr>
</table>
</div>

<!-- FIXTURES -->
<div id="fixtures" class="page">
<div id="fixtureList"></div>
<button class="view-btn" onclick="viewMore()">View More</button>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="chat-container">
<div class="chat-messages" id="messages">
<div class="message">Samuel: Welcome guys 🔥</div>
<div class="message you">You: Let's gooo 💪</div>
</div>

<div class="chat-input">
<input type="text" id="msgInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>

<script>
function showPage(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

/* FIXTURES DATA */
let fixtures = [
"Mon, 16 Apr|2:00|CPE|APE",
"Tue, 17 Apr|4:00|RMD|JBL",
"Wed, 18 Apr|3:00|CPE|RMD",
"Thu, 19 Apr|5:00|APE|JBL",
"Fri, 20 Apr|2:00|CPE|JBL",
"Sat, 21 Apr|4:00|APE|RMD",
"Sun, 22 Apr|6:00|CPE|APE",
"Mon, 23 Apr|2:00|RMD|JBL",
"Tue, 24 Apr|4:00|CPE|RMD",
"Wed, 25 Apr|5:00|APE|JBL",
"Thu, 26 Apr|2:00|CPE|JBL"
];

let shown = 10;

function loadFixtures(){
let container=document.getElementById("fixtureList");
container.innerHTML="";
fixtures.slice(0,shown).forEach(f=>{
let parts=f.split("|");
container.innerHTML+=`
<div class="fixture">
<div class="date">${parts[0]}</div>
<div class="time">${parts[1]}</div>
<div class="match">
<span>${parts[2]}</span>
<span>Vs</span>
<span>${parts[3]}</span>
</div>
</div>`;
});
}

function viewMore(){
shown=fixtures.length;
loadFixtures();
document.querySelector('.view-btn').style.display="none";
}

loadFixtures();

/* CHAT */
function sendMessage(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="message you";
msg.innerText="You: "+input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight;
}
}
</script>

</body>
</html>
