<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Tournament App</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;}
.header{background:#075e54;color:white;padding:15px;font-weight:bold;text-align:center;}
nav{display:flex;justify-content:space-around;background:#25D366;padding:10px;}
nav button{padding:8px 15px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;background:#128C7E;}
.page{display:none;padding:15px;}
.active{display:block;}
.group-table{border-collapse:collapse;width:100%;margin-bottom:20px;}
.group-table th, .group-table td{border:1px solid #ccc;padding:6px;text-align:center;}
.fixture-card{border:1px solid #ccc;border-radius:8px;padding:10px;margin-bottom:10px;background:white;}
input.score{width:40px;text-align:center;}
button.set-result{padding:4px 8px;margin-left:5px;}
</style>
</head>
<body>

<div class="header">League Tournament App</div>
<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('tables')">Tables</button>
  <button onclick="showPage('fixtures')">Fixtures/Results</button>
</nav>

<!-- Home Page -->
<div id="home" class="page active">
  <h2>Admin News</h2>
  <div id="adminNews">Welcome to the League Tournament!</div>
</div>

<!-- Tables Page -->
<div id="tables" class="page">
  <h2>Group Tables</h2>
  <div id="tablesContainer"></div>
</div>

<!-- Fixtures Page -->
<div id="fixtures" class="page">
  <h2>Fixtures & Results</h2>
  <div id="fixturesContainer"></div>
</div>

<script>
// --- Config ---
const GROUPS = ['A','B','C','D','E','F','G','H','I'];
const TEAMS_PER_GROUP = 4;
let groups = {}; // will store team info
let fixtures = {}; // will store fixtures for each group

// --- Input Teams (admin can edit these names) ---
for(let g=0; g<GROUPS.length; g++){
  groups[GROUPS[g]] = [];
  for(let t=0; t<TEAMS_PER_GROUP; t++){
    let name = prompt(`Enter name of team ${t+1} for group ${GROUPS[g]}`, `Team ${t+1}`);
    groups[GROUPS[g]].push({name:name,w:0,d:0,l:0,gd:0,pts:0});
  }
}

// --- Generate round-robin fixtures for each group ---
for(let g of GROUPS){
  fixtures[g] = [];
  let teams = groups[g].map(team=>team.name);
  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      fixtures[g].push({home:teams[i],away:teams[j],scoreHome:null,scoreAway:null,date:'TBD'});
    }
  }
}

// --- Utility: Show Page ---
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// --- Display Tables ---
function renderTables(){
  let container = document.getElementById('tablesContainer');
  container.innerHTML='';
  for(let g of GROUPS){
    let tbl = document.createElement('table');
    tbl.classList.add('group-table');
    let html = `<tr><th colspan="7">Group ${g}</th></tr>
    <tr><th>Team</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>`;
    groups[g].sort((a,b)=>b.pts-b.pts || b.gd-a.gd);
    for(let team of groups[g]){
      html += `<tr>
        <td>${team.name}</td>
        <td>${team.w}</td>
        <td>${team.d}</td>
        <td>${team.l}</td>
        <td>${team.gd}</td>
        <td>${team.pts}</td>
      </tr>`;
    }
    tbl.innerHTML = html;
    container.appendChild(tbl);
  }
}

// --- Display Fixtures ---
function renderFixtures(){
  let container = document.getElementById('fixturesContainer');
  container.innerHTML='';
  for(let g of GROUPS){
    let h3 = document.createElement('h3');
    h3.innerText = `Group ${g}`;
    container.appendChild(h3);
    for(let f of fixtures[g]){
      let div = document.createElement('div');
      div.classList.add('fixture-card');
      div.innerHTML = `<b>${f.date}</b><br>${f.home} vs ${f.away} 
        <br>
        <input type="number" class="score" placeholder="Home" min="0" id="home-${g}-${f.home}-${f.away}">
        <input type="number" class="score" placeholder="Away" min="0" id="away-${g}-${f.home}-${f.away}">
        <button class="set-result" onclick="setResult('${g}','${f.home}','${f.away}')">Set Result</button>`;
      container.appendChild(div);
    }
  }
}

// --- Set Result ---
function setResult(group,home,away){
  let sh = document.getElementById(`home-${group}-${home}-${away}`).value;
  let sa = document.getElementById(`away-${group}-${home}-${away}`).value;
  if(sh==='' || sa===''){alert("Enter both scores"); return;}
  sh = parseInt(sh); sa = parseInt(sa);
  let f = fixtures[group].find(fx=>fx.home===home && fx.away===away);
  f.scoreHome=sh; f.scoreAway=sa;
  // Update table
  let homeTeam = groups[group].find(t=>t.name===home);
  let awayTeam = groups[group].find(t=>t.name===away);
  if(sh>sa){homeTeam.w+=1; homeTeam.pts+=3; awayTeam.l+=1;}
  else if(sh<sa){awayTeam.w+=1; awayTeam.pts+=3; homeTeam.l+=1;}
  else{homeTeam.d+=1; awayTeam.d+=1; homeTeam.pts+=1; awayTeam.pts+=1;}
  homeTeam.gd += (sh-sa); awayTeam.gd += (sa-sh);
  renderTables();
}

// --- Initial render ---
renderTables();
renderFixtures();

</script>

</body>
</html>
