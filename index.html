<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Chat Prototype</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;}
.chat-container{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;background:#fff;}
.header{background:#075e54;color:white;padding:15px;font-weight:bold;}
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.message{max-width:75%;padding:8px;margin:5px 0;border-radius:8px;position:relative;word-wrap:break-word;transition:transform 0.2s ease;}
.sent{align-self:flex-end;background:#dcf8c6;}
.received{align-self:flex-start;background:#fff;}
.reply-preview{background:#f0f0f0;padding:5px;margin-bottom:5px;border-radius:5px;font-size:12px;cursor:pointer;}
.reply-name{font-weight:bold;font-size:12px;margin-bottom:2px;}
.message img{max-width:100%;border-radius:6px;margin-top:5px;}
.input-area{display:flex;align-items:center;padding:10px;border-top:1px solid #ddd;position:relative;}
textarea{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc;outline:none;max-height:120px;overflow-y:auto;}
button{margin-left:5px;padding:8px 12px;border:none;border-radius:20px;background:#075e54;color:white;cursor:pointer;}
.sticker-picker{position:absolute;bottom:50px;left:10px;background:white;border-radius:12px;padding:5px;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;flex-wrap:wrap;width:200px;gap:5px;}
.sticker-picker img{width:50px;height:50px;cursor:pointer;border-radius:6px;}
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">Sammy Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <button onclick="toggleStickerPicker()">� stickers</button>
    <button onclick="attachImage()">📷</button>
    <textarea id="messageInput" rows="1" placeholder="Type a message"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="stickerPicker" class="sticker-picker" style="display:none;"></div>

<script>
let messagesDiv = document.getElementById("messages");
let messageInput = document.getElementById("messageInput");
let stickerPicker = document.getElementById("stickerPicker");
let replyTo = null;
let messageCount = 0;
let longPressTimer;

// Predefined stickers (WhatsApp style)
const stickers = [
  "https://i.imgur.com/1Q1Z1G5.png",
  "https://i.imgur.com/XsQOWjU.png",
  "https://i.imgur.com/5Tt9Bna.png",
  "https://i.imgur.com/3v2Ujhy.png"
];

// Populate sticker picker
stickers.forEach(src=>{
  let img = document.createElement("img");
  img.src=src;
  img.onclick = () => {
    createMessage("", "sent", replyTo, src);
    replyTo=null;
    stickerPicker.style.display="none";
  };
  stickerPicker.appendChild(img);
});

// Adjust textarea height
messageInput.addEventListener("input", function(){
  this.style.height="auto";
  this.style.height=this.scrollHeight+"px";
});

function toggleStickerPicker(){
  stickerPicker.style.display = stickerPicker.style.display==="none"?"flex":"none";
}

function attachImage(){
  let fileInput = document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";
  fileInput.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(evt){
      createMessage("", "sent", replyTo, evt.target.result);
      replyTo=null;
    };
    reader.readAsDataURL(file);
  };
  fileInput.click();
}

function sendMessage(){
  let text = messageInput.value.trim();
  if(text==="") return;
  createMessage(text, "sent", replyTo);
  messageInput.value="";
  replyTo=null;
}

function createMessage(text,type,replyData=null,imgSrc=null){
  messageCount++;
  let msgDiv = document.createElement("div");
  msgDiv.classList.add("message",type);
  msgDiv.id = "msg-"+messageCount;

  if(replyData){
    let preview = document.createElement("div");
    preview.classList.add("reply-preview");
    preview.innerHTML = `<div class="reply-name">${replyData.name}</div>${replyData.text || '<i>Sticker/Image</i>'}`;
    preview.onclick = ()=>document.getElementById(replyData.id).scrollIntoView({behavior:"smooth"});
    msgDiv.appendChild(preview);
  }

  if(text) msgDiv.appendChild(document.createElement("div")).innerText=text;
  if(imgSrc){
    let img = document.createElement("img");
    img.src=imgSrc;
    msgDiv.appendChild(img);
  }

  // Swipe-to-reply
  let startX=0;
  let currentX=0;
  let threshold=60;

  msgDiv.addEventListener("mousedown", e=>{
    startX = e.clientX;
    longPressTimer = setTimeout(()=>setReply(msgDiv.id,type==="sent"?"You":"Other",text || '<Sticker/Image>'),500);
    msgDiv.onmousemove = move;
    msgDiv.onmouseup = up;
  });

  function move(e){
    currentX = e.clientX;
    let diff = currentX - startX;
    if(diff>0) msgDiv.style.transform = "translateX("+diff+"px)";
  }

  function up(){
    let diff = currentX - startX;
    msgDiv.style.transform="translateX(0px)";
    if(diff>threshold){
      setReply(msgDiv.id,type==="sent"?"You":"Other",text || '<Sticker/Image>');
    }
    msgDiv.onmousemove=null;
    msgDiv.onmouseup=null;
    clearTimeout(longPressTimer);
  }

  // For mobile long press
  msgDiv.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    longPressTimer = setTimeout(()=>setReply(msgDiv.id,type==="sent"?"You":"Other",text || '<Sticker/Image>'),500);
  });
  msgDiv.addEventListener("touchend", e=>{
    clearTimeout(longPressTimer);
  });

  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function setReply(id,name,text){
  replyTo = {id,name,text};
  messageInput.placeholder="Replying to "+name;
}

// Sample received messages
createMessage("Hello! This is a test message","received");
createMessage("You can reply to messages or stickers/images","received");
</script>

</body>
</html>
